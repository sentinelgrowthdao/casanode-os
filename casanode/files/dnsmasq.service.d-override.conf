[Unit]
After=casanode-unblock-wifi.service sys-subsystem-net-devices-wlan0.device dhcpcd.service
Requires=casanode-unblock-wifi.service sys-subsystem-net-devices-wlan0.device dhcpcd.service
Wants=network-pre.target
BindsTo=sys-subsystem-net-devices-wlan0.device

[Service]
ExecStartPre=/bin/sh -c 'for i in $(seq 1 15); do [ -e /sys/class/net/wlan0 ] && exit 0; sleep 1; done; echo "[dnsmasq] wlan0 not present after 15s" >&2; exit 1'
Restart=on-failure
RestartSec=2s